name: 打包 ZFS 模块

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: debian${{ matrix.config.debian_ver }}-${{ matrix.config.arch }}-zfs${{ matrix.config.zfs_ver }}
    runs-on: ${{ matrix.config.runner }}
    container:
      image: debian:${{ matrix.config.debian_ver }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {debian_ver: "11", zfs_ver: "2.1.15", arch: amd64, runner: ubuntu-24.04}
          - {debian_ver: "11", zfs_ver: "2.1.15", arch: arm64, runner: ubuntu-24.04-arm}
          - {debian_ver: "12", zfs_ver: "2.2.7",  arch: amd64, runner: ubuntu-24.04}
          - {debian_ver: "12", zfs_ver: "2.2.7",  arch: arm64, runner: ubuntu-24.04-arm}
          - {debian_ver: "13", zfs_ver: "2.3.0",  arch: amd64, runner: ubuntu-24.04}
          - {debian_ver: "13", zfs_ver: "2.3.0",  arch: arm64, runner: ubuntu-24.04-arm}

    steps:
      - name: 安装编译依赖和所有可用内核
        run: |
          apt-get update -qq
          apt-get install -y --fix-missing curl xz-utils \
            build-essential autoconf automake libtool pkg-config \
            libtirpc-dev libblkid-dev uuid-dev zlib1g-dev \
            libattr1-dev libacl1-dev libudev-dev libssl-dev \
            libelf-dev python3 python3-dev python3-setuptools \
            python3-cffi libffi-dev

          # 安装所有可用的内核头文件（排除 RT 和 cloud 内核）
          echo "查询所有可用的 linux-headers 包..."
          apt-cache search "^linux-headers-[0-9].*-${{ matrix.config.arch }}$" | \
            awk '{print $1}' | \
            grep -v '\-rt\-' | \
            grep -v '\-cloud\-' | \
            while read pkg; do
              echo "安装: $pkg"
              apt-get install -y --fix-missing "$pkg" || echo "跳过: $pkg"
            done

      - name: 获取所有已安装的内核版本
        id: kernels
        run: |
          echo "检查已安装的内核头文件:"
          ls -la /usr/src/ | grep linux-headers || true
          KERNEL_VERS=$(ls /usr/src/ | grep "^linux-headers-" | grep -v "\-common" | sed 's/linux-headers-//')
          echo "检测到的内核版本:"
          echo "$KERNEL_VERS"
          COUNT=$(echo "$KERNEL_VERS" | wc -l)
          echo "共计 ${COUNT} 个内核版本"
          echo "vers<<EOF" >> $GITHUB_OUTPUT
          echo "$KERNEL_VERS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 下载编译 ZFS
        run: |
          curl -fSL "https://github.com/openzfs/zfs/releases/download/zfs-${{ matrix.config.zfs_ver }}/zfs-${{ matrix.config.zfs_ver }}.tar.gz" -o /tmp/zfs.tar.gz
          tar -xzf /tmp/zfs.tar.gz -C /tmp
          cd /tmp/zfs-${{ matrix.config.zfs_ver }}
          ./autogen.sh
          ./configure
          make -j$(nproc)

      - name: 为所有内核打包 ko 文件
        shell: bash
        run: |
          mkdir -p /tmp/release-files
          echo "${{ steps.kernels.outputs.vers }}" | while IFS= read -r KERNEL_VER; do
            [ -z "$KERNEL_VER" ] && continue
            echo "=========================================="
            echo "正在为内核 ${KERNEL_VER} 打包..."
            echo "=========================================="
            FILENAME="zfs-modules-${{ matrix.config.arch }}-${KERNEL_VER}-zfs${{ matrix.config.zfs_ver }}.tgz"
            mkdir -p /tmp/zfs-modules
            find /tmp/zfs-${{ matrix.config.zfs_ver }} -name "*.ko" -exec xz -k {} \;
            find /tmp/zfs-${{ matrix.config.zfs_ver }} -name "*.ko.xz" -exec cp {} /tmp/zfs-modules/ \;
            tar -czf "/tmp/release-files/${FILENAME}" -C /tmp zfs-modules/
            rm -rf /tmp/zfs-modules
            echo "✓ 已生成: ${FILENAME}"
          done
          echo "=========================================="
          echo "所有打包文件:"
          ls -lh /tmp/release-files/
          echo "=========================================="

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download
          files: /tmp/release-files/*
